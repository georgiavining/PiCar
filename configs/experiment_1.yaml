wandb_entity: georgia-k-vining-university-of-nottingham
project_name: self-driving-car-kaggle
experiment_name: experiment_1
description: Debugging run

angle_model:
  input_shape: [224, 224, 3]
  conv_blocks:
    - filters: 64
      kernel_size: [3, 3]
      batch_norm: true
      activation: relu
      pool: maxpool
    - filters: 128
      kernel_size: [3, 3]
      batch_norm: true
      activation: relu
      pool: maxpool
    - filters: 256
      kernel_size: [3, 3]
      batch_norm: true
      activation: relu
      pool: maxpool
    - filters: 512
      kernel_size: [3, 3]
      batch_norm: true
      activation: relu
      pool: maxpool
  global_pooling: global_average
  dense_layers:
    - units: 256
      activation: relu
      dropout: 0.3
    - units: 128
      activation: relu
      dropout: 0.3
  output_units: 1
  output_activation: sigmoid

speed_model:
  input_shape: [224, 224, 3]
  conv_blocks:
    - filters: 32
      kernel_size: [3, 3]
      batch_norm: true
      activation: relu
      pool: maxpool
    - filters: 64
      kernel_size: [3, 3]
      batch_norm: true
      activation: relu
      pool: maxpool
    - filters: 128
      kernel_size: [3, 3]
      batch_norm: true
      activation: relu
      pool: maxpool
    - filters: 256
      kernel_size: [3, 3]
      batch_norm: true
      activation: relu
      pool: maxpool
  global_pooling: global_average
  dense_layers:
    - units: 128
      activation: relu
      dropout: 0.5
  output_units: 1
  output_activation: sigmoid

hyperparameters:
  learning_rate: 0.001
  angle_epochs: 3
  speed_epochs: 3
